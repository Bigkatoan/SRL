# SAC on Reacher-v5  (obs=10, act=2)
# Target return: ~-3 (convergence ~200k steps)

algo: sac

encoders:
  - name: state_enc
    type: mlp
    input_dim: 10
    latent_dim: 128
    layers:
      - {out_features: 128, activation: relu, norm: layer_norm}
      - {out_features: 128, activation: relu, norm: layer_norm}

flows:
  - "state_enc -> actor"
  - "state_enc -> critic"

actor:
  name: actor
  type: squashed_gaussian
  action_dim: 2
  log_std_min: -5.0
  log_std_max: 2.0

critic:
  name: critic
  type: twin_q
  action_dim: 2

losses:
  - {name: sac_q,           weight: 1.0}
  - {name: sac_policy,      weight: 1.0}
  - {name: sac_temperature, weight: 1.0}

train:
  total_steps: 200_000
  lr_actor: 3e-4
  lr_critic: 3e-4
  lr_alpha: 3e-4
  buffer_size: 200_000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  learning_starts: 5_000
  train_freq: 1
  gradient_steps: 1
