name: Docs i18n CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - 'i18n/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings mkdocs-static-i18n

      - name: Build documentation (strict)
        run: |
          mkdocs build --strict

      - name: List site output
        run: |
          ls -la site || true
