# PPO on LunarLanderContinuous-v3  (obs=8, act=2)
# Target return: > 200 (convergence ~1.5M steps)

algo: ppo

encoders:
  - name: state_enc
    type: mlp
    input_dim: 8
    latent_dim: 128
    layers:
      - {out_features: 128, activation: tanh, norm: none}
      - {out_features: 128, activation: tanh, norm: none}

flows:
  - "state_enc -> actor"
  - "state_enc -> critic"

actor:
  name: actor
  type: gaussian
  action_dim: 2
  log_std_init: -0.5

critic:
  name: critic
  type: value
  layers: []

losses:
  - {name: policy,  weight: 1.0}
  - {name: value,   weight: 0.5}
  - {name: entropy, weight: 0.01}

train:
  total_steps: 1_500_000
  n_envs: 8
  n_steps: 1024
  batch_size: 256
  n_epochs: 10
  lr: 3e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
